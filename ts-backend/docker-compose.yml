services:
  ts-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocketmind-ts-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/pocketmind_ts
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pocketmind-net

  postgres:
    image: postgres:16-alpine
    container_name: pocketmind-ts-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pocketmind_ts
    ports:
      - "5433:5432" # Map host 5433 to container 5432 to avoid conflict with Java backend
    volumes:
      - postgres_data_ts:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pocketmind-net

volumes:
  postgres_data_ts:

networks:
  pocketmind-net:
    driver: bridge
